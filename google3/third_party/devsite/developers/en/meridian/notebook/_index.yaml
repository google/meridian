project_path: /meridian/_project.yaml
book_path: /meridian/mmm/_book.yaml
landing_page:
  nav: left
  rows:
  - heading: Notebook Examples
    description: >
      Meridian is an open source MMM geared towards helping marketers optimize their spend. To learn more about the project, check out
      the <a href="/meridian/mmm/">documentation</a>.
  - options:
    - cards
    items_across: 3
    items:
    - heading: Getting Started Guide
      path: /meridian/notebook/meridian-getting-started
      description: Learn the end-to-end workflow of Meridian on a sample dataset.
    - heading: Getting Started Guide (JAX)
      path: /meridian/notebook/meridian-getting-started-jax
      description: End-to-end workflow of Meridian using JAX for accelerated performance.
    - heading: Meridian MLFlow Demo
      path: https://colab.sandbox.google.com/github/google/meridian/blob/main/demo/Meridian_MLflow_Demo.ipynb
      description: Example of integrating Meridian with MLflow for experiment tracking.
    - heading: Reach & Frequency Demo
      path: https://colab.sandbox.google.com/github/google/meridian/blob/main/demo/Meridian_RF_Demo.ipynb
      description: Explore reach and frequency modeling capabilities with Meridian.
    - heading: Reach & Frequency Simulated Dataset
      path: https://colab.sandbox.google.com/github/google/meridian/blob/main/demo/RF_Data_Simulation_for_Meridian.ipynb
      description: Generate simulated reach and frequency datasets for Meridian.
    - heading: ROI, mROI & Response Curves Demo
      path: https://colab.sandbox.google.com/github/google/meridian/blob/main/demo/ROI_mROI_Response_Curves.ipynb
      description: Deep dive into calculating ROI, marginal ROI, and response curves.
