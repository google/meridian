edition = "2023";

package mmm.v1.model.meridian.eda;

option features.field_presence = IMPLICIT;
option java_multiple_files = true;
option java_outer_classname = "EDASpecProto";
option java_package = "com.google.protos.mmm.v1.model.meridian.eda";

// Represents an aggregation function used in EDA.
message AggregationFunction {
  // A key that maps to a custom function in the user-provided function
  // registry. The registry allows the EDA spec to be serialized without
  // including the function's code, enabling a more secure deserialization
  // process. Required.
  string function_key = 1;
}

// A configuration for customizing variable aggregation functions.
//
// Variables not specified will default to SUM.
message AggregationConfig {
  // A map from control variable names to their aggregation functions.
  map<string, AggregationFunction> control_variables = 1;
  // A map from non-media treatment names to their aggregation functions.
  map<string, AggregationFunction> non_media_treatments = 2;
}

// A spec for the EDA KPI invariability check.
message KpiInvariabilitySpec {
  // The threshold for KPI standard deviation. Required.
  double std_threshold = 1 [features.field_presence = EXPLICIT];
}

// A spec for the EDA standard deviation check.
message StandardDeviationSpec {
  // The threshold for geo-level standard deviation. Required.
  double geo_std_threshold = 1 [features.field_presence = EXPLICIT];
  // The threshold for national-level standard deviation. Required.
  double national_std_threshold = 2 [features.field_presence = EXPLICIT];
}

// A spec for the EDA VIF check.
message VIFSpec {
  // The threshold for geo-level VIF. Required.
  double geo_threshold = 1;
  // The threshold for overall VIF. Required.
  double overall_threshold = 2;
  // The threshold for national VIF. Required.
  double national_threshold = 3;
  // The threshold for standard deviation. Required.
  double std_threshold = 4 [features.field_presence = EXPLICIT];
}

// A spec for the EDA pairwise correlation check.
message PairwiseCorrSpec {
  // The threshold for overall pairwise correlation. Required.
  double overall_threshold = 1 [features.field_presence = EXPLICIT];
  // The threshold for geo-level pairwise correlation. Required.
  double geo_threshold = 2 [features.field_presence = EXPLICIT];
  // The threshold for national pairwise correlation. Required.
  double national_threshold = 3 [features.field_presence = EXPLICIT];
}

// A container for all user-configurable EDA check specs.
message EDASpec {
  // Configuration for custom variable aggregation functions.
  AggregationConfig aggregation_config = 1;
  // Specification for the EDA VIF check.
  VIFSpec vif_spec = 2;
  // Lookup table that contains function names mapped to hashed functions used
  // by various aggregation functions.
  map<string, string> function_registry = 3;
  // Specification for the EDA pairwise correlation check.
  PairwiseCorrSpec pairwise_corr_spec = 4;
  // Specification for the EDA KPI invariability check.
  KpiInvariabilitySpec kpi_invariability_spec = 5;
  // Specification for the EDA standard deviation check.
  StandardDeviationSpec std_spec = 6;
}
